<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Land Remembered | Minimal Hub</title>
  <style>
    /* TOY EXAMPLE. NOT FINAL DESIGN. */

    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f1eb;
      color: #2a2a2a;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Demo banner */
    .demo-banner {
      background: #ff6b6b;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.5px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    /* Main layout */
    .layout {
      display: flex;
      min-height: 100vh;
      padding-top: 36px;
    }

    /* Left content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      max-width: 50%;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      line-height: 1.1;
    }

    .tagline {
      font-size: 1rem;
      color: #666;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* CTAs */
    .ctas {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .cta {
      text-decoration: none;
      padding: 16px 32px;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .cta-primary {
      background: #2a2a2a;
      color: #f5f1eb;
    }

    .cta-primary:hover {
      background: #1a1a1a;
    }

    .cta-secondary {
      border: 1px solid #2a2a2a;
      color: #2a2a2a;
    }

    .cta-secondary:hover {
      background: #2a2a2a;
      color: #f5f1eb;
    }

    /* Bookshelf on right */
    .bookshelf {
      width: 50%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 40px 60px 40px 0;
      perspective: 1200px;
    }

    .shelf {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      transform-style: preserve-3d;
    }

    .spine {
      width: 70px;
      height: calc(100vh - 160px);
      max-height: 700px;
      min-height: 400px;
      background: linear-gradient(135deg, #8b7355 0%, #6b5344 100%);
      border-radius: 3px 8px 8px 3px;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        4px 4px 20px rgba(0,0,0,0.2),
        inset -2px 0 4px rgba(0,0,0,0.1);
      position: relative;
    }

    .spine:nth-child(2) {
      background: linear-gradient(135deg, #5c6b4a 0%, #3d4a32 100%);
      height: calc(100vh - 180px);
      max-height: 680px;
    }

    .spine:nth-child(3) {
      background: linear-gradient(135deg, #4a5c6b 0%, #324a5c 100%);
      height: calc(100vh - 200px);
      max-height: 660px;
    }

    .spine span {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      color: #f5f1eb;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      letter-spacing: 3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .spine:hover {
      transform: translateX(-30px) rotateY(-25deg);
      box-shadow:
        20px 10px 40px rgba(0,0,0,0.3),
        inset -2px 0 4px rgba(0,0,0,0.1);
    }

    .spine::after {
      content: '';
      position: absolute;
      top: 10%;
      bottom: 10%;
      left: 8px;
      width: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
    }

    /* Footer note */
    .approach-note {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #999;
      font-size: 11px;
      max-width: 300px;
    }

    /* Mobile styles */
    @media (max-width: 768px) {
      body {
        overflow-y: auto;
        overflow-x: hidden;
      }

      .layout {
        flex-direction: column;
        min-height: auto;
        padding-top: 36px;
        padding-bottom: 100px;
      }

      .content {
        max-width: 100%;
        padding: 40px 24px;
        text-align: center;
        order: 1;
      }

      h1 {
        font-size: 2rem;
      }

      .tagline {
        margin-bottom: 32px;
      }

      .ctas {
        justify-content: center;
        gap: 12px;
      }

      .cta {
        padding: 14px 24px;
        font-size: 11px;
      }

      .bookshelf {
        width: 100%;
        justify-content: center;
        padding: 20px;
        order: 2;
      }

      .shelf {
        gap: 8px;
      }

      .spine {
        width: 50px;
        height: 280px;
        min-height: 200px;
        max-height: 300px;
      }

      .spine:nth-child(2) {
        height: 260px;
        max-height: 280px;
      }

      .spine:nth-child(3) {
        height: 240px;
        max-height: 260px;
      }

      .spine span {
        font-size: 12px;
        letter-spacing: 2px;
      }

      .spine:hover {
        transform: translateX(-15px) rotateY(-15deg);
      }

      .approach-note {
        position: relative;
        bottom: auto;
        left: auto;
        text-align: center;
        padding: 20px;
        max-width: 100%;
        order: 3;
      }
    }
  </style>
</head>
<body>
  <div class="demo-banner">TOY EXAMPLE. Approach 1: Minimal Hub. Not Final Design.</div>

  <div class="layout">
    <div class="content">
      <h1>A Land Remembered</h1>
      <p class="tagline">A Florida Saga</p>

      <div class="ctas">
        <a href="#" class="cta cta-primary">Watch the Series</a>
        <a href="#" class="cta cta-secondary">Shop the Books</a>
      </div>
    </div>

    <div class="bookshelf">
      <div class="shelf">
        <div class="spine"><span>Book One</span></div>
        <div class="spine"><span>Book Two</span></div>
        <div class="spine"><span>Book Three</span></div>
      </div>
    </div>
  </div>

  <div class="approach-note">
    <p><strong>Approach 1: Minimal Hub</strong></p>
    <p>Clean. Typographic. Book spines as navigation. Inspired by Operate, Museo Thyssen, Obys Library.</p>
  </div>
</body>
</html>
