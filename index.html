<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Land Remembered — Website Directions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #111;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Iframe container */
    .frame-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .frame-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      position: absolute;
      top: 0;
      left: 0;
    }

    .frame-container iframe.active {
      opacity: 1;
      z-index: 1;
    }

    /* Liquid glass switcher */
    .switcher {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 6px;
      padding: 8px;
      border-radius: 50px;
      background: linear-gradient(
        135deg,
        rgba(20, 20, 20, 0.85) 0%,
        rgba(30, 30, 30, 0.8) 50%,
        rgba(20, 20, 20, 0.85) 100%
      );
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.2);
    }

    .switcher::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 50px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.06) 0%,
        transparent 40%
      );
      pointer-events: none;
    }

    /* Sliding pill indicator */
    .slider-pill {
      position: absolute;
      top: 8px;
      left: 8px;
      height: calc(100% - 16px);
      border-radius: 40px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.18) 0%,
        rgba(255, 255, 255, 0.08) 100%
      );
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.15);
      transition: all 0.4s cubic-bezier(0.68, -0.2, 0.32, 1.2);
      z-index: -1;
    }

    .switcher-btn {
      position: relative;
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: color 0.3s ease, text-shadow 0.3s ease;
      white-space: nowrap;
      z-index: 1;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .switcher-btn:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    .switcher-btn.active {
      color: #fff;
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
    }

    .switcher-btn span.price {
      display: block;
      font-size: 10px;
      font-weight: 300;
      opacity: 0.7;
      margin-top: 2px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
    }

    /* Liquid ripple effect on click */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: ripple 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* Loading state */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      letter-spacing: 0.1em;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="loading">Loading...</div>

  <div class="frame-container">
    <iframe id="frame-1" src="approach-1-minimal/index.html" class="active"></iframe>
    <iframe id="frame-2" src="approach-2-dynamic/index.html"></iframe>
    <iframe id="frame-3" src="approach-3-experiential/index.html"></iframe>
  </div>

  <nav class="switcher">
    <div class="slider-pill" id="pill"></div>
    <button class="switcher-btn active" data-target="1" onclick="switchApproach(1, this)">
      Minimal Hub
      <span class="price">$1,850</span>
    </button>
    <button class="switcher-btn" data-target="2" onclick="switchApproach(2, this)">
      Dynamic
      <span class="price">$2,500</span>
    </button>
    <button class="switcher-btn" data-target="3" onclick="switchApproach(3, this)">
      Experiential
      <span class="price">$6,000</span>
    </button>
  </nav>

  <script>
    const pill = document.getElementById('pill');
    const buttons = document.querySelectorAll('.switcher-btn');
    const frames = document.querySelectorAll('.frame-container iframe');

    // Initialize pill position
    function updatePill(btn) {
      pill.style.width = btn.offsetWidth + 'px';
      pill.style.left = btn.offsetLeft + 'px';
    }

    // Set initial pill position
    updatePill(buttons[0]);

    function switchApproach(num, btn) {
      // Create ripple effect
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = btn.getBoundingClientRect();
      ripple.style.left = '50%';
      ripple.style.top = '50%';
      ripple.style.width = ripple.style.height = '20px';
      ripple.style.marginLeft = '-10px';
      ripple.style.marginTop = '-10px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);

      // Update active states
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Move pill
      updatePill(btn);

      // Switch iframe
      frames.forEach(f => f.classList.remove('active'));
      document.getElementById(`frame-${num}`).classList.add('active');
    }

    // Handle window resize
    window.addEventListener('resize', () => {
      const activeBtn = document.querySelector('.switcher-btn.active');
      updatePill(activeBtn);
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const current = parseInt(document.querySelector('.switcher-btn.active').dataset.target);
      let next = current;

      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        next = current > 1 ? current - 1 : 3;
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        next = current < 3 ? current + 1 : 1;
      } else if (e.key >= '1' && e.key <= '3') {
        next = parseInt(e.key);
      }

      if (next !== current) {
        const btn = document.querySelector(`[data-target="${next}"]`);
        switchApproach(next, btn);
      }
    });
  </script>
</body>
</html>
